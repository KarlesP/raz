name: Build (debug)

# Manual only — never triggered on push. Builds the debug binaries for raz + raz-tui on
# Linux and Windows and uploads them as workflow artifacts.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build debug (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            ext: ""
          - os: windows-latest
            label: windows-x86_64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Build debug binaries
        run: cargo build --bins

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp "target/debug/raz${{ matrix.ext }}"     "dist/raz-${{ matrix.label }}${{ matrix.ext }}"
          cp "target/debug/raz-tui${{ matrix.ext }}" "dist/raz-tui-${{ matrix.label }}${{ matrix.ext }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raz-debug-${{ matrix.label }}
          path: dist/*

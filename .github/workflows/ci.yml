name: CI

# Build + test on every merge to develop (the GitFlow integration branch). No release here —
# releases are cut manually from main via build-release.yml.
on:
  push:
    branches: [develop]

permissions:
  contents: read

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace

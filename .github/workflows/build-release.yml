name: Build (release)

# Manual only — never triggered on push. Builds the optimized binaries for raz + raz-tui on
# Linux and Windows, uploads them as artifacts, then publishes a GitHub Release tagged from
# the root VERSION file.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            ext: ""
          - os: windows-latest
            label: windows-x86_64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --bins

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/raz${{ matrix.ext }}"     "dist/raz-${{ matrix.label }}${{ matrix.ext }}"
          cp "target/release/raz-tui${{ matrix.ext }}" "dist/raz-tui-${{ matrix.label }}${{ matrix.ext }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raz-release-${{ matrix.label }}
          path: dist/*

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION="$(grep -oE 'v?[0-9]+\.[0-9]+\.[0-9]+' VERSION | head -1)"
          VERSION="${VERSION#v}"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: dist/*
          generate_release_notes: true
          draft: false
